<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neura Link</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #07070F;
    --surface:   #0D0D1C;
    --card:      #111126;
    --border:    #1C1C38;
    --accent:    #5B6EF5;
    --accent2:   #00C8FF;
    --glow:      rgba(91,110,245,.35);
    --glow2:     rgba(0,200,255,.2);
    --text:      #E2E4F0;
    --muted:     #5A5A7A;
    --white:     #FFFFFF;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Neural background canvas ── */
  #neural-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: .28;
    pointer-events: none;
  }

  /* ── Header ── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.4rem 2.5rem;
    border-bottom: 1px solid var(--border);
    background: rgba(7,7,15,.85);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    position: sticky;
    top: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: .65rem;
    text-decoration: none;
  }
  .brand-icon {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 18px var(--glow);
  }
  .brand-icon svg { width: 18px; height: 18px; }
  .brand-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -.01em;
    color: var(--white);
  }
  .brand-name span {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .count-badge {
    font-size: .72rem;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: .28rem .75rem;
  }
  .count-badge span {
    color: var(--accent2);
    font-weight: 600;
  }

  /* ── Search ── */
  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .search-wrap svg {
    position: absolute;
    left: .65rem;
    color: var(--muted);
    width: 15px; height: 15px;
    pointer-events: none;
  }
  #search {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .45rem .75rem .45rem 2rem;
    font-family: 'Inter', sans-serif;
    font-size: .82rem;
    color: var(--text);
    width: 180px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(91,110,245,.15);
  }

  /* ── Hero strip ── */
  .hero-strip {
    position: relative;
    z-index: 5;
    padding: 3.5rem 2.5rem 2.5rem;
    text-align: center;
  }
  .hero-eyebrow {
    display: inline-block;
    font-size: .72rem;
    font-weight: 500;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: .9rem;
  }
  .hero-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2rem, 5vw, 3.4rem);
    font-weight: 700;
    letter-spacing: -.03em;
    line-height: 1.1;
    color: var(--white);
    margin-bottom: .9rem;
  }
  .hero-title .gradient-text {
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero-sub {
    font-size: .92rem;
    font-weight: 300;
    color: var(--muted);
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* ── Filter bar ── */
  .filter-bar {
    position: relative;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: .5rem;
    padding: 0 2.5rem 1.8rem;
    flex-wrap: wrap;
  }
  .filter-label {
    font-size: .72rem;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: .4rem;
  }
  .view-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: .35rem .65rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: .35rem;
    color: var(--muted);
    font-size: .78rem;
    font-family: 'Inter', sans-serif;
    transition: all .18s;
  }
  .view-btn svg { width: 14px; height: 14px; }
  .view-btn:hover, .view-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(91,110,245,.08);
  }

  /* ── Grid ── */
  .grid-wrap {
    position: relative;
    z-index: 5;
    padding: 0 2rem 4rem;
  }

  #profile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
    transition: grid-template-columns .3s;
  }
  #profile-grid.view-large {
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  }
  #profile-grid.view-small {
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  }

  /* ── Profile card ── */
  .profile-card {
    position: relative;
    aspect-ratio: 1;
    border-radius: 50%;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid var(--border);
    background: var(--card);
    transition: transform .28s cubic-bezier(.22,1,.36,1),
                border-color .28s,
                box-shadow .28s;
    will-change: transform;
  }
  .profile-card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    opacity: 0;
    z-index: 1;
    transition: opacity .28s;
    pointer-events: none;
  }
  .profile-card::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: var(--card);
    z-index: 2;
    pointer-events: none;
  }
  .profile-card img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 3;
    display: block;
    transition: transform .4s cubic-bezier(.22,1,.36,1), filter .3s;
    filter: saturate(.92) brightness(.95);
  }
  .profile-card .overlay {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(91,110,245,.25) 0%, transparent 70%);
    z-index: 4;
    opacity: 0;
    transition: opacity .28s;
    pointer-events: none;
  }
  .profile-card:hover {
    transform: scale(1.07) translateY(-4px);
    border-color: transparent;
    box-shadow: 0 0 0 2px var(--accent), 0 8px 40px var(--glow), 0 0 60px var(--glow2);
  }
  .profile-card:hover::before { opacity: 1; }
  .profile-card:hover img {
    transform: scale(1.06);
    filter: saturate(1.05) brightness(1.02);
  }
  .profile-card:hover .overlay { opacity: 1; }

  /* Loading shimmer */
  .profile-card.loading img { opacity: 0; }
  .profile-card.loading::after {
    background: linear-gradient(90deg, var(--card) 25%, var(--surface) 50%, var(--card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Lightbox ── */
  #lightbox {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(4,4,12,.94);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  #lightbox.open {
    opacity: 1;
    pointer-events: all;
  }
  .lb-inner {
    position: relative;
    max-width: min(520px, 90vw);
    max-height: 92vh;
    width: 100%;
  }
  .lb-img-wrap {
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(91,110,245,.3);
    box-shadow: 0 0 80px rgba(91,110,245,.3), 0 0 120px rgba(0,200,255,.15);
    aspect-ratio: 1;
    background: var(--card);
  }
  .lb-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .lb-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(13,13,28,.9);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text);
    transition: border-color .2s, background .2s;
    z-index: 10;
  }
  .lb-nav:hover {
    border-color: var(--accent);
    background: rgba(91,110,245,.15);
    color: var(--accent);
  }
  .lb-nav.prev { left: -56px; }
  .lb-nav.next { right: -56px; }
  .lb-nav svg { width: 18px; height: 18px; }
  .lb-close {
    position: absolute;
    top: -16px; right: -16px;
    background: rgba(13,13,28,.95);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted);
    transition: color .2s, border-color .2s;
    z-index: 10;
  }
  .lb-close:hover { color: var(--white); border-color: var(--accent); }
  .lb-counter {
    text-align: center;
    margin-top: .9rem;
    font-size: .78rem;
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: .08em;
  }
  .lb-counter span { color: var(--accent2); font-weight: 600; }

  /* ── No results ── */
  #no-results {
    display: none;
    text-align: center;
    padding: 5rem 2rem;
    color: var(--muted);
    font-size: .92rem;
  }
  #no-results svg {
    width: 48px; height: 48px;
    margin: 0 auto 1rem;
    opacity: .3;
    display: block;
  }

  /* ── Footer ── */
  footer {
    position: relative;
    z-index: 5;
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: .75rem;
    letter-spacing: .05em;
  }
  footer span {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 600;
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    header { padding: 1rem 1.2rem; }
    .hero-strip { padding: 2.5rem 1.2rem 1.8rem; }
    .filter-bar { padding: 0 1.2rem 1.5rem; }
    .grid-wrap { padding: 0 1rem 3rem; }
    #search { width: 130px; }
    .lb-nav.prev { left: -42px; }
    .lb-nav.next { right: -42px; }
    .lb-nav { width: 36px; height: 36px; }
  }
  @media (max-width: 440px) {
    .lb-nav { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .profile-card, .profile-card img { transition: none; }
  }
</style>
</head>

/* ─────────────────────────────────────────────
   Neural Background Canvas
───────────────────────────────────────────── */
(function() {
  const canvas = document.getElementById('neural-bg');
  const ctx = canvas.getContext('2d');
  let W, H, nodes, animId;
  const NODE_COUNT = 60;
  const MAX_DIST = 160;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initNodes() {
    nodes = Array.from({ length: NODE_COUNT }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - .5) * .35,
      vy: (Math.random() - .5) * .35,
      r: Math.random() * 1.8 + .6,
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    // Update
    for (const n of nodes) {
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
    }
    // Lines
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const d = Math.hypot(dx, dy);
        if (d < MAX_DIST) {
          const alpha = (1 - d / MAX_DIST) * .45;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = `rgba(91,110,245,${alpha})`;
          ctx.lineWidth = .6;
          ctx.stroke();
        }
      }
    }
    // Dots
    for (const n of nodes) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,200,255,.6)';
      ctx.fill();
    }
    animId = requestAnimationFrame(draw);
  }

  resize();
  initNodes();
  draw();
  window.addEventListener('resize', () => { resize(); initNodes(); });
})();

const grid = document.getElementById('profile-grid');
const countEl = document.getElementById('visible-count');
const noResults = document.getElementById('no-results');

/* ── Render cards ── */
let visibleIndices = files.map((_, i) => i);

function renderGrid(indices) {
  grid.innerHTML = '';
  if (indices.length === 0) {
    noResults.style.display = 'block';
    countEl.textContent = '0';
    return;
  }
  noResults.style.display = 'none';
  countEl.textContent = indices.length;
  visibleIndices = indices;

  indices.forEach((fileIdx, pos) => {
    const card = document.createElement('div');
    card.className = 'profile-card loading';
    card.dataset.index = pos;

    const img = document.createElement('img');
    img.alt = 'Profile';
    img.loading = 'lazy';
    img.src = BASE + files[fileIdx];
    img.onload = () => {
      card.classList.remove('loading');
      img.style.opacity = '1';
    };
    img.onerror = () => { card.style.display = 'none'; };

    const overlay = document.createElement('div');
    overlay.className = 'overlay';

    card.appendChild(img);
    card.appendChild(overlay);
    card.addEventListener('click', () => openLightbox(pos));
    grid.appendChild(card);
  });
}

renderGrid(visibleIndices);

/* ── Search ── */
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { renderGrid(files.map((_, i) => i)); return; }
  const filtered = [];
  files.forEach((f, i) => { if (f.toLowerCase().includes(q)) filtered.push(i); });
  renderGrid(filtered);
});

/* ── View toggles ── */
function setView(cls, active) {
  grid.classList.remove('view-small', 'view-large');
  if (cls) grid.classList.add(cls);
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  active.classList.add('active');
}
document.getElementById('btn-small').addEventListener('click', function() { setView('view-small', this); });
document.getElementById('btn-med').addEventListener('click',   function() { setView('', this); });
document.getElementById('btn-large').addEventListener('click', function() { setView('view-large', this); });

/* ── Lightbox ── */
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbNum = document.getElementById('lb-num');
const lbTotal = document.getElementById('lb-total');
let currentPos = 0;

function openLightbox(pos) {
  currentPos = pos;
  updateLb();
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
}
function updateLb() {
  const fileIdx = visibleIndices[currentPos];
  lbImg.src = BASE + files[fileIdx];
  lbNum.textContent = currentPos + 1;
  lbTotal.textContent = visibleIndices.length;
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', () => {
  currentPos = (currentPos - 1 + visibleIndices.length) % visibleIndices.length;
  updateLb();
});
document.getElementById('lb-next').addEventListener('click', () => {
  currentPos = (currentPos + 1) % visibleIndices.length;
  updateLb();
});
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') { currentPos = (currentPos - 1 + visibleIndices.length) % visibleIndices.length; updateLb(); }
  if (e.key === 'ArrowRight') { currentPos = (currentPos + 1) % visibleIndices.length; updateLb(); }
});

/* ── Touch swipe for lightbox ── */
let touchStartX = 0;
lb.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
lb.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    currentPos = dx < 0
      ? (currentPos + 1) % visibleIndices.length
      : (currentPos - 1 + visibleIndices.length) % visibleIndices.length;
    updateLb();
  }
});
</script>
</body>
</html>
